<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Área Administrativa | Comunidade do Reino</title>
    <meta name="description" content="Área administrativa simulada para gestão de voluntários." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="pages.css" />
  </head>
  <body>
    <a class="skip-link" href="#conteudo">Pular para o conteúdo principal</a>
    <header class="site-header">
      <div class="shell header-inner">
        <a class="brand" href="index.html" aria-label="Voltar para página inicial">
          <img class="brand-logo-img" src="logo.jpg" alt="" aria-hidden="true" />
          <span class="brand-text">Comunidade do Reino</span>
        </a>
        <button class="menu-toggle" type="button" aria-expanded="false" aria-controls="menu-principal" aria-label="Abrir menu">
          <span></span><span></span>
        </button>
        <nav id="menu-principal" class="main-nav" aria-label="Principal">
          <a href="sobre.html">Sobre</a>
          <a href="projetos.html">Projetos</a>
          <a href="biblioteca.html">Biblioteca</a>
          <a href="metodologia.html">Metodologia</a>
          <a href="voluntario.html">Faça Parte</a>
          <a href="contato.html">Contato</a>
          <a class="nav-cta" href="voluntario.html">Seja Voluntário</a>
        </nav>
      </div>
    </header>

    <main id="conteudo" class="shell">
      <section class="page-hero">
        <h1 id="admin-greeting">Área Administrativa</h1>
        <p>Ambiente de gestão simulado para equipe voluntária.</p>
      </section>

      <section class="section">
        <article class="table-card">
          <h2>Painel de Voluntários</h2>
          <p id="admin-status" class="status" aria-live="polite"></p>
          <div class="inline-links">
            <a class="btn btn-primary" href="voluntario.html">Voltar para login/cadastro</a>
            <button id="logout-btn" class="btn btn-dark" type="button">Encerrar sessão</button>
          </div>
          <table class="table" aria-label="Lista de voluntários cadastrados">
            <thead>
              <tr>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Área</th>
                <th>Cadastro</th>
              </tr>
            </thead>
            <tbody id="voluntarios-body"></tbody>
          </table>
        </article>
      </section>
    </main>

    <footer class="site-footer"><div class="shell"><p>© <span id="year"></span> Comunidade do Reino.</p></div></footer>
    <script src="pages.js"></script>
    <script src="admin.js"></script>
    <script>document.getElementById('year').textContent = String(new Date().getFullYear());</script>
  </body>
</html>
