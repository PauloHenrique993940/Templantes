<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">Cena ilustrada de comunidade e escrita</title>
    <desc id="desc">Ilustracao com pessoas ao fundo e um voluntario em destaque, usada como imagem do hero.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#24364e" />
            <stop offset="48%" stop-color="#33445d" />
            <stop offset="100%" stop-color="#171f2b" />
        </linearGradient>
        <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#5f3641" />
            <stop offset="50%" stop-color="#714554" />
            <stop offset="100%" stop-color="#402d39" />
        </linearGradient>
        <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3f8ad8" />
            <stop offset="100%" stop-color="#2e5fa4" />
        </linearGradient>
        <filter id="softBlur" x="-30%" y="-30%" width="160%" height="160%">
