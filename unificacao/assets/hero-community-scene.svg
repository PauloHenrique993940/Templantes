        <path d="M26 34 C68 -8 152 -7 194 36 L200 98 L18 96 Z" fill="#ba5e68" />
        <path d="M90 128 C136 130 168 164 174 208 L182 264 L44 264 L56 202 C64 160 88 132 90 128 Z" fill="#222833"
