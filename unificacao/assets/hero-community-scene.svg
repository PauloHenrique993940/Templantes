    <rect x="605" y="0" width="280" height="900" fill="#7b485a" opacity="0.26" filter="url(#softBlur)" />
    <rect x="0" y="635" width="1600" height="265" fill="#151b23" opacity="0.35" />
    <path d="M0 665 C270 605 455 592 652 622 C820 648 1016 723 1222 701 C1360 686 1487 641 1600 615 L1600 900 L0 900 Z"
